<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terax</title>
    <script>
      // iOS < 16.4 (Safari/JSC) has no regex lookbehind. Several bundled deps
      // build `new RegExp("(?<=...)")` at module load (GFM autolink/strikethrough
      // boundaries, etc.), which throws "Invalid regular expression" and aborts
      // the whole bundle — a black screen with no catchable error. If the engine
      // can't do lookbehind, wrap RegExp so construction strips lookbehind groups
      // instead of throwing. No-op on capable engines; identical output for every
      // pattern the engine already accepts (only previously-throwing ones change).
      (function () {
        try {
          new RegExp("(?<=a)");
          return;
        } catch (e) {}
        var O = RegExp;
        var LB = /\(\?<[=!](?:[^()\\]|\\.|\([^()]*\))*\)/g;
        function P(pattern, flags) {
          var hasFlags = arguments.length >= 2;
          try {
            return hasFlags ? new O(pattern, flags) : new O(pattern);
          } catch (e1) {
            var s = typeof pattern === "string" ? pattern.replace(LB, "") : pattern;
            try {
              return hasFlags ? new O(s, flags) : new O(s);
            } catch (e2) {
              return hasFlags ? new O("", flags) : new O("");
            }
          }
        }
        P.prototype = O.prototype;
        try {
          Object.getOwnPropertyNames(O).forEach(function (k) {
            if (k === "prototype" || k === "length" || k === "name") return;
            try {
              P[k] = O[k];
            } catch (e) {}
          });
        } catch (e) {}
        RegExp = P;
        if (typeof window !== "undefined") window.RegExp = P;
      })();
    </script>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("terax-ui-theme-shadow");
          var resolved =
            t === "light" || t === "dark"
              ? t
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.classList.add(resolved);
          document.documentElement.style.backgroundColor =
            resolved === "dark" ? "#0a0a0a" : "#ffffff";
        } catch (e) {}
      })();
    </script>
    <!-- TEMP on-device diagnostic (inline so it always runs, like the theme
         script above). Remove once the black-screen cause is found. -->
    <script>
      (function () {
        function panel() {
          var d = document.getElementById("__terax_diag");
          if (d) return d;
          d = document.createElement("pre");
          d.id = "__terax_diag";
          d.style.cssText =
            "position:fixed;left:0;top:0;right:0;max-height:70vh;overflow:auto;" +
            "margin:0;padding:8px;z-index:2147483647;background:rgba(0,0,0,.92);" +
            "color:#19ff8c;font:12px/1.4 monospace;white-space:pre-wrap";
          var btn = document.createElement("button");
          btn.textContent = "× close";
          btn.style.cssText =
            "position:fixed;top:4px;right:4px;z-index:2147483647;background:#222;" +
            "color:#fff;border:1px solid #555;border-radius:4px;padding:2px 10px;font:12px monospace";
          btn.onclick = function () { d.remove(); btn.remove(); };
          var add = function () {
            var r = document.body || document.documentElement;
            r.appendChild(d); r.appendChild(btn);
          };
          if (document.body) add();
          else document.addEventListener("DOMContentLoaded", add);
          return d;
        }
        function log(msg) { panel().textContent += msg + "\n"; }
        window.__teraxLog = log;
        log("[diag] inline JS OK");
        window.addEventListener("error", function (e) {
          log("[error] " + e.message + "  @ " + e.filename + ":" + e.lineno + ":" + e.colno);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          log("[promise] " + ((r && (r.stack || r.message)) || String(r)));
        });
        window.addEventListener("securitypolicyviolation", function (e) {
          log("[csp] blocked " + e.blockedURI + "  (" + e.violatedDirective + ")");
        });
        setTimeout(function () {
          log("[diag] main.tsx module executed: " + (window.__teraxMainLoaded ? "YES" : "NO"));
          var mods = document.querySelectorAll('script[type="module"]');
          log("[diag] module <script> tags: " + mods.length);
          for (var i = 0; i < mods.length; i++) {
            (function (src) {
              if (!src) return;
              fetch(src)
                .then(function (r) {
                  log("[fetch] " + src + " -> " + r.status + " ct=" + r.headers.get("content-type"));
                })
                .catch(function (err) { log("[fetch] " + src + " -> FAILED " + err); });
              import(src)
                .then(function () { log("[import] " + src + " -> OK"); })
                .catch(function (err) {
                  log("[import] " + src + " -> ERR " + ((err && (err.message || err)) || err));
                });
            })(mods[i].getAttribute("src"));
          }
        }, 3000);
      })();
    </script>
    <script type="module" src="/src/debug-console.ts"></script>
  </head>

  <body>
    <div id="root">
      <div id="terminal"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
